  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;body&gt;
&lt;div id=&quot;weggesperrt-lernraum&quot; class=&quot;wl-shell&quot;&gt;
  &lt;style&gt;
    #weggesperrt-lernraum {
      color: var(--foreground);
      background: var(--background);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;
      min-width: 0;
      --wl-red-soft: color-mix(in srgb, var(--destructive) 76%, var(--card));
      --wl-red-deep: color-mix(in srgb, var(--destructive) 84%, var(--foreground));
    }
    #weggesperrt-lernraum * { box-sizing: border-box; }
    #weggesperrt-lernraum .wl-cover {
      aspect-ratio: 16 / 10;
      min-height: 430px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 24px;
      padding: clamp(24px, 6vw, 58px);
      margin-bottom: 22px;
      color: var(--primary-foreground);
      background:
        linear-gradient(145deg, var(--wl-red-deep), var(--wl-red-soft));
      overflow: hidden;
      position: relative;
    }
    #weggesperrt-lernraum .wl-cover::after {
      content: &quot;&quot;;
      position: absolute;
      width: 45%;
      aspect-ratio: 1;
      right: -15%;
      bottom: -38%;
      border: 1px solid color-mix(in srgb, var(--primary-foreground) 28%, transparent);
      border-radius: 50%;
    }
    #weggesperrt-lernraum .wl-cover-head,
    #weggesperrt-lernraum .wl-cover-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    #weggesperrt-lernraum .wl-cover-logo-wrap {
      width: 82px;
      height: 82px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }
    #weggesperrt-lernraum .wl-cover-logo {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }
    #weggesperrt-lernraum .wl-cover-label {
      letter-spacing: .12em;
      text-transform: uppercase;
      text-align: right;
    }
    #weggesperrt-lernraum .wl-cover-main {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(180px, .6fr);
      gap: 28px;
      align-items: center;
      position: relative;
      z-index: 1;
    }
    #weggesperrt-lernraum .wl-cover-kicker {
      margin: 0 0 12px;
      letter-spacing: .14em;
      text-transform: uppercase;
      opacity: .82;
    }
    #weggesperrt-lernraum .wl-cover h1 {
      margin: 0 0 12px;
      letter-spacing: .07em;
      text-transform: uppercase;
    }
    #weggesperrt-lernraum .wl-cover-subtitle {
      margin: 0;
      max-width: 38ch;
    }
    #weggesperrt-lernraum .wl-cover-icon-wrap {
      display: grid;
      place-items: center;
    }
    #weggesperrt-lernraum .wl-cover-icon {
      width: 100%;
      max-width: 230px;
      height: auto;
      display: block;
    }
    #weggesperrt-lernraum .wl-cover-author strong { display: block; margin-top: 3px; }
    #weggesperrt-lernraum .wl-cover-class { text-align: right; }
    #weggesperrt-lernraum .wl-topbar,
    #weggesperrt-lernraum .wl-toolbar,
    #weggesperrt-lernraum .wl-section-head,
    #weggesperrt-lernraum .wl-actions,
    #weggesperrt-lernraum .wl-progress-label,
    #weggesperrt-lernraum .wl-task-meta,
    #weggesperrt-lernraum .wl-source-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    #weggesperrt-lernraum .wl-topbar {
      padding: 10px 0 16px;
      border-bottom: 1px solid var(--border);
    }
    #weggesperrt-lernraum .wl-brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    #weggesperrt-lernraum .wl-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      color: var(--primary-foreground);
      background: var(--wl-red-deep);
      border-radius: 50%;
      flex: 0 0 auto;
    }
    #weggesperrt-lernraum .wl-brand-copy { min-width: 0; }
    #weggesperrt-lernraum .wl-brand-name { font-weight: 500; letter-spacing: .08em; }
    #weggesperrt-lernraum .wl-subtitle { color: var(--muted-foreground); }
    #weggesperrt-lernraum .wl-toolbar { padding: 16px 0 10px; }
    #weggesperrt-lernraum .wl-layout {
      display: grid;
      grid-template-columns: minmax(210px, .78fr) minmax(0, 2fr);
      gap: 24px;
      padding: 10px 0 18px;
      align-items: start;
    }
    #weggesperrt-lernraum .wl-sidebar { min-width: 0; }
    #weggesperrt-lernraum .wl-main { min-width: 0; }
    #weggesperrt-lernraum .wl-progress-label { margin-bottom: 7px; }
    #weggesperrt-lernraum .wl-progress-track {
      height: 8px;
      background: var(--muted);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 18px;
    }
    #weggesperrt-lernraum .wl-progress-fill {
      height: 100%;
      width: 0;
      background: var(--wl-red-deep);
      transition: width .25s ease;
    }
    #weggesperrt-lernraum .wl-module-list { display: grid; gap: 5px; }
    #weggesperrt-lernraum .wl-module-btn {
      width: 100%;
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) 20px;
      gap: 9px;
      align-items: center;
      padding: 10px 8px;
      border: 0;
      border-radius: 8px;
      text-align: left;
      color: var(--foreground);
      background: transparent;
      cursor: pointer;
      font: inherit;
    }
    #weggesperrt-lernraum .wl-module-btn:hover { background: var(--accent); color: var(--accent-foreground); }
    #weggesperrt-lernraum .wl-module-btn[aria-current=&quot;step&quot;] { background: var(--wl-red-deep); color: var(--primary-foreground); }
    #weggesperrt-lernraum .wl-module-no {
      width: 28px;
      height: 28px;
      border: 1px solid currentColor;
      border-radius: 50%;
      display: grid;
      place-items: center;
      opacity: .82;
    }
    #weggesperrt-lernraum .wl-module-copy { min-width: 0; }
    #weggesperrt-lernraum .wl-module-title { display: block; font-weight: 500; }
    #weggesperrt-lernraum .wl-module-time { display: block; opacity: .72; }
    #weggesperrt-lernraum .wl-check { visibility: hidden; }
    #weggesperrt-lernraum .wl-module-btn.is-complete .wl-check { visibility: visible; }
    #weggesperrt-lernraum .wl-hero {
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 18px;
    }
    #weggesperrt-lernraum .wl-eyebrow { color: var(--muted-foreground); margin: 0 0 5px; }
    #weggesperrt-lernraum .wl-hero h2 { margin: 0 0 8px; }
    #weggesperrt-lernraum .wl-hero p { margin: 0; max-width: 72ch; }
    #weggesperrt-lernraum .wl-meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    #weggesperrt-lernraum .wl-workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(220px, .85fr);
      gap: 20px;
      align-items: start;
    }
    #weggesperrt-lernraum .wl-section { min-width: 0; }
    #weggesperrt-lernraum .wl-section h3 { margin: 0 0 10px; }
    #weggesperrt-lernraum .wl-task-list { margin: 0; padding-left: 22px; }
    #weggesperrt-lernraum .wl-task-list li { margin-bottom: 10px; padding-left: 4px; }
    #weggesperrt-lernraum .wl-continuum { margin-top: 16px; padding: 16px; }
    #weggesperrt-lernraum .wl-continuum[hidden] { display: none; }
    #weggesperrt-lernraum .wl-continuum h3 { margin: 0 0 5px; }
    #weggesperrt-lernraum .wl-spectrum-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
      font-weight: 500;
    }
    #weggesperrt-lernraum .wl-spectrum {
      height: 96px;
      margin: 0 10px 12px;
      position: relative;
    }
    #weggesperrt-lernraum .wl-spectrum-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 4px;
      transform: translateY(-50%);
      background: linear-gradient(90deg, var(--viz-series-2), var(--wl-red-deep));
    }
    #weggesperrt-lernraum .wl-spectrum-marker {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      position: absolute;
      left: 50%;
      top: 50%;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      color: var(--primary-foreground);
      background: var(--wl-red-deep);
      transition: left .18s ease, top .18s ease;
    }
    #weggesperrt-lernraum .wl-spectrum-marker.is-selected {
      outline: 3px solid var(--ring);
      outline-offset: 2px;
    }
    #weggesperrt-lernraum .wl-spectrum-controls { margin-top: 12px; }
    #weggesperrt-lernraum .wl-spectrum-list { margin: 14px 0 0; padding-left: 22px; }
    #weggesperrt-lernraum .wl-spectrum-list li { margin-bottom: 6px; }
    #weggesperrt-lernraum .wl-evidence {
      margin-top: 16px;
      padding: 16px;
    }
    #weggesperrt-lernraum .wl-evidence label { display: block; margin-bottom: 7px; font-weight: 500; }
    #weggesperrt-lernraum .wl-evidence textarea { min-height: 132px; resize: vertical; }
    #weggesperrt-lernraum .wl-save-state { min-height: 1.4em; color: var(--muted-foreground); margin-top: 7px; }
    #weggesperrt-lernraum .wl-side-stack { display: grid; gap: 18px; }
    #weggesperrt-lernraum .wl-compact-list { margin: 8px 0 0; padding-left: 20px; }
    #weggesperrt-lernraum .wl-compact-list li { margin-bottom: 7px; }
    #weggesperrt-lernraum .wl-question {
      margin: 0;
      padding-left: 14px;
      border-left: 3px solid var(--wl-red-deep);
    }
    #weggesperrt-lernraum .wl-teacher {
      margin-top: 18px;
      border-top: 1px solid var(--border);
      padding-top: 18px;
    }
    #weggesperrt-lernraum .wl-teacher[hidden] { display: none; }
    #weggesperrt-lernraum .wl-teacher-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }
    #weggesperrt-lernraum .wl-teacher-grid h3 { margin: 0 0 8px; }
    #weggesperrt-lernraum .wl-teacher-grid p { margin: 0; }
    #weggesperrt-lernraum .wl-footer {
      margin-top: 18px;
      padding: 16px 0 6px;
      border-top: 1px solid var(--border);
      color: var(--muted-foreground);
    }
    #weggesperrt-lernraum .wl-footer a { color: var(--foreground); }
    #weggesperrt-lernraum .wl-plan-view[hidden],
    #weggesperrt-lernraum .wl-module-view[hidden] { display: none; }
    #weggesperrt-lernraum .wl-plan-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }
    #weggesperrt-lernraum .wl-phase { min-width: 0; }
    #weggesperrt-lernraum .wl-phase-line {
      height: 5px;
      background: var(--muted);
      margin: 10px 0 14px;
      position: relative;
    }
    #weggesperrt-lernraum .wl-phase-line::before {
      content: &quot;&quot;;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--wl-red-deep);
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }
    #weggesperrt-lernraum .wl-phase h3 { margin: 0; }
    #weggesperrt-lernraum .wl-phase ol { margin: 0; padding-left: 20px; }
    #weggesperrt-lernraum .wl-phase li { margin-bottom: 8px; }
    #weggesperrt-lernraum .wl-note {
      margin-top: 18px;
      padding: 16px;
      border-left: 4px solid var(--viz-series-2);
      background: color-mix(in srgb, var(--viz-series-2) 9%, transparent);
    }
    #weggesperrt-lernraum .wl-note strong { display: block; margin-bottom: 5px; }
    #weggesperrt-lernraum .wl-source-row { align-items: flex-start; }
    #weggesperrt-lernraum .wl-source-row + .wl-source-row { margin-top: 8px; }
    @media (max-width: 760px) {
      #weggesperrt-lernraum .wl-layout,
      #weggesperrt-lernraum .wl-workspace { grid-template-columns: 1fr; }
      #weggesperrt-lernraum .wl-module-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      #weggesperrt-lernraum .wl-teacher-grid,
      #weggesperrt-lernraum .wl-plan-grid { grid-template-columns: 1fr; }
      #weggesperrt-lernraum .wl-cover { aspect-ratio: auto; min-height: 0; }
      #weggesperrt-lernraum .wl-cover-main { grid-template-columns: 1fr; }
      #weggesperrt-lernraum .wl-cover-icon-wrap { max-width: 250px; }
      #weggesperrt-lernraum .wl-cover-class { text-align: left; }
    }
    @media (max-width: 430px) {
      #weggesperrt-lernraum .wl-module-list { grid-template-columns: 1fr; }
      #weggesperrt-lernraum .wl-topbar { align-items: flex-start; }
    }
    @media (prefers-reduced-motion: reduce) {
      #weggesperrt-lernraum .wl-progress-fill,
      #weggesperrt-lernraum .wl-spectrum-marker { transition: none; }
    }
    @media print {
      #weggesperrt-lernraum .wl-toolbar,
      #weggesperrt-lernraum .wl-sidebar,
      #weggesperrt-lernraum .wl-actions { display: none !important; }
      #weggesperrt-lernraum .wl-layout,
      #weggesperrt-lernraum .wl-workspace { display: block; }
      #weggesperrt-lernraum .wl-teacher { display: block !important; }
    }

      function render() {

        els.product.textContent = module.product;

        els.continuum.hidden = index !== 0;

        els.question.textContent = module.question;
        els.scaffolds.replaceChildren(...module.scaffolds.map(text =&gt; { const li = document.createElement(&#x27;li&#x27;); li.textContent = text; return li; }));
        els.competence.textContent = module.competence;
        els.organisation.textContent = module.organisation;
        els.differentiation.textContent = module.differentiation;

        const moduleChecks = state.checks[index] || [false, false, false];
        els.checks.forEach((checkbox, checkIndex) =&gt; { checkbox.checked = Boolean(moduleChecks[checkIndex]); });

        els.next.disabled = index === modules.length - 1;
        drawList();
        drawProgress();
        if (window.lucide) window.lucide.createIcons({ attrs: { width: 16, height: 16 } });

      let noteTimer;
      els.spectrumSelect.addEventListener(&#x27;change&#x27;, () =&gt; {
        state.spectrumSelected = Number(els.spectrumSelect.value);
        drawSpectrum();
        save(&#x27;Einordnung gespeichert.&#x27;);

      els.spectrumRange.addEventListener(&#x27;input&#x27;, () =&gt; {
        state.spectrum[state.spectrumSelected] = Number(els.spectrumRange.value);

      els.notes.addEventListener(&#x27;input&#x27;, () =&gt; {

      els.checks.forEach((checkbox, checkIndex) =&gt; {
        checkbox.addEventListener(&#x27;change&#x27;, () =&gt; {

      els.complete.addEventListener(&#x27;click&#x27;, () =&gt; {
        const index = state.selected;

        save(state.complete.includes(index) ? &#x27;Modul als bearbeitet gespeichert.&#x27; : &#x27;Markierung zurückgenommen.&#x27;);

      els.next.addEventListener(&#x27;click&#x27;, () =&gt; {
        if (state.selected &lt; modules.length - 1) {

      function switchView(view) {
        const moduleActive = view === &#x27;module&#x27;;
        els.moduleView.hidden = !moduleActive;
        els.planView.hidden = moduleActive;
        els.moduleTab.classList.toggle(&#x27;btn-primary&#x27;, moduleActive);

      root.querySelector(&#x27;#wl-print&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; window.print());
      render();

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);

      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)

    );

      .then(({ x, y }) =&gt; {

      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {

        }
      });

  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;

    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };

    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger

      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0

      openTooltip(trigger);
      return;

    }

  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);

    }

    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
